name: Reproduce silent exit code 1

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  baseline:
    name: "baseline: bun install (no flags)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: bun install
        run: bun install

  frozen-lockfile:
    name: "frozen-lockfile: bun install --frozen-lockfile"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: bun install --frozen-lockfile
        run: bun install --frozen-lockfile

  frozen-prefer-offline:
    name: "frozen+offline: bun install --frozen-lockfile --prefer-offline"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: bun install --frozen-lockfile --prefer-offline
        run: bun install --frozen-lockfile --prefer-offline

  safe-chain-frozen:
    name: "safe-chain + frozen-lockfile"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci
      - name: bun install --frozen-lockfile
        run: bun install --frozen-lockfile

  safe-chain-frozen-offline:
    name: "safe-chain + frozen-lockfile + prefer-offline"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci
      - name: bun install --frozen-lockfile --prefer-offline
        run: bun install --frozen-lockfile --prefer-offline

  safe-chain-frozen-offline-npmrc:
    name: "safe-chain + frozen + offline + .npmrc private registry"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci
      - name: bun install --frozen-lockfile --prefer-offline
        run: bun install --frozen-lockfile --prefer-offline
        env:
          PRIVATE_REGISTRY_TOKEN: fake-token-for-testing

  full-lava-setup:
    name: "full lava-platform setup (safe-chain + preinstall + frozen + offline + .npmrc)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci
      - name: bun install --frozen-lockfile --prefer-offline
        run: bun install --frozen-lockfile --prefer-offline
        env:
          PRIVATE_REGISTRY_TOKEN: fake-token-for-testing
          npm_config_mpp_env: prod
